name: Auto-merge PRs

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:
    inputs:
      merge_method:
        description: "Merge method (merge/squash/rebase)"
        required: false
        default: "squash"
      dry_run:
        description: "Dry-run mode (true/false) — log actions without executing"
        required: false
        default: "false"
      max_prs_per_repo:
        description: "Max bot PRs to process per repo"
        required: false
        default: "1"
      only_repos:
        description: "Comma-separated list of repos to process (owner/repo). Leave empty for all."
        required: false
        default: ""
      skip_repos:
        description: "Comma-separated list of repos to skip (owner/repo)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1

      - name: Install dependencies
        run: yarn

      - name: Run auto-merge script
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          MERGE_METHOD: ${{ github.event.inputs.merge_method || 'squash' }}
          MAX_BEHIND_BY: "20"
          MAX_PRS_PER_REPO: ${{ github.event.inputs.max_prs_per_repo || '1' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          CONCURRENCY: "5"
          CI_FAIL_CLOSE_THRESHOLD: "3"
          ONLY_REPOS: ${{ github.event.inputs.only_repos || '' }}
          SKIP_REPOS: ${{ github.event.inputs.skip_repos || '' }}
        run: node scripts/auto-merge.js
